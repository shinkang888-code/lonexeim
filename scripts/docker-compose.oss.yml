# LONEX Hub — OSS module backends (Phase 1)
# Usage: docker compose -f scripts/docker-compose.oss.yml --profile dify up -d
# Env: copy from lonex-hub/.env.local or Vercel pull

services:
  dify-api:
    profiles: [dify]
    image: langgenius/dify-api:1.4.0
    environment:
      SECRET_KEY: ${DIFY_SECRET_KEY:-change-me}
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
    depends_on: [dify-db, dify-redis]
    ports: ["5001:5001"]

  dify-web:
    profiles: [dify]
    image: langgenius/dify-web:1.4.0
    environment:
      CONSOLE_API_URL: http://localhost:5001
      APP_API_URL: http://localhost:5001
    ports: ["3001:3000"]
    depends_on: [dify-api]

  dify-db:
    profiles: [dify]
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: dify
    volumes: [dify_pg:/var/lib/postgresql/data]

  dify-redis:
    profiles: [dify]
    image: redis:7-alpine

  rocketchat:
    profiles: [rocketchat]
    image: rocket.chat:6.13.0
    environment:
      MONGO_URL: mongodb://rocketchat-mongo:27017/rocketchat
      ROOT_URL: http://localhost:3002
    ports: ["3002:3000"]
    depends_on: [rocketchat-mongo]

  rocketchat-mongo:
    profiles: [rocketchat]
    image: mongo:6

  roundcube:
    profiles: [roundcube]
    image: roundcube/roundcubemail:latest
    ports: ["8080:80"]
    environment:
      ROUNDCUBEMAIL_DEFAULT_HOST: ${IMAP_HOST:-imap.example.com}

  livekit:
    profiles: [livekit]
    image: livekit/livekit-server:latest
    command: --dev
    ports: ["7880:7880", "7881:7881", "7882:7882/udp"]

  mediacms:
    profiles: [mediacms]
    image: mediacms/mediacms:latest
    ports: ["8800:80"]
    environment:
      SECRET_KEY: ${MEDIACMS_SECRET:-change-me}

  nextcloud:
    profiles: [nextcloud]
    image: nextcloud:29-apache
    ports: ["8081:80"]
    volumes: [nextcloud_data:/var/www/html]

  outline:
    profiles: [outline]
    image: outlinewiki/outline:latest
    ports: ["3003:3000"]
    environment:
      DATABASE_URL: postgres://outline:outline@outline-db:5432/outline
      REDIS_URL: redis://outline-redis:6379
      SECRET_KEY: ${OUTLINE_SECRET:-change-me}
      URL: http://localhost:3003
    depends_on: [outline-db, outline-redis]

  outline-db:
    profiles: [outline]
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: outline
      POSTGRES_PASSWORD: outline
      POSTGRES_DB: outline

  outline-redis:
    profiles: [outline]
    image: redis:7-alpine

  chatwoot:
    profiles: [chatwoot]
    image: chatwoot/chatwoot:latest
    ports: ["3004:3000"]
    environment:
      FRONTEND_URL: http://localhost:3004
      POSTGRES_HOST: chatwoot-db
      REDIS_URL: redis://chatwoot-redis:6379
    depends_on: [chatwoot-db, chatwoot-redis]

  chatwoot-db:
    profiles: [chatwoot]
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: chatwoot

  chatwoot-redis:
    profiles: [chatwoot]
    image: redis:7-alpine

volumes:
  dify_pg:
  nextcloud_data:
